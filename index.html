<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>PS99 RAP Monitor Pro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">

</head>

<body>

<nav class="navbar navbar-dark bg-black shadow">

<div class="container">

<span class="navbar-brand fw-bold">

💎 PS99 RAP Monitor

</span>

<button id="refreshBtn"
class="btn btn-primary">

<i class="bi bi-arrow-clockwise"></i>

Refresh

</button>

</div>

</nav>

<div class="container py-4">

<!-- Dashboard -->

<div class="row g-3 mb-4">

<div class="col-4">

<div class="dashboard-card">

<h2 id="totalItems">0</h2>

<p>Total</p>

</div>

</div>

<div class="col-4">

<div class="dashboard-card">

<h2 id="inflatedItems">0</h2>

<p>Inflated</p>

</div>

</div>

<div class="col-4">

<div class="dashboard-card">

<h2 id="updatedTime">--:--</h2>

<p>Updated</p>

</div>

</div>

</div>

<!-- Search -->

<input

id="search"

class="form-control form-control-lg"

placeholder="Search Huge, Titanic, Item..."

>

<!-- Filters -->

<div class="filters mt-3">

<button class="btn btn-primary filterBtn"

data-filter="all">

All

</button>

<button class="btn btn-outline-light filterBtn"

data-filter="Huge">

Huge

</button>

<button class="btn btn-outline-light filterBtn"

data-filter="Titanic">

Titanic

</button>

<button class="btn btn-outline-light filterBtn"

data-filter="Item">

Items

</button>

<button class="btn btn-outline-light filterBtn"

data-filter="Charm">

Charms

</button>

<button class="btn btn-outline-danger filterBtn"

data-filter="Inflated">

Inflated

</button>

</div>

<div id="status"

class="text-center text-secondary mt-4">

Loading database...

</div>

<div

id="itemContainer"

class="row g-3 mt-2">

</div>

</div>

<script src="app.js"></script>

</body>

</html>
